<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirSense</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>AirSense</h1>
  <p>Real-Time Air Quality Dashboard</p>
</header>

<main>
  <div class="aqi-card">
    <h2>Current AQI</h2>
    <div id="aqiValue">--</div>
    <div id="aqiStatus">Loading...</div>
  </div>

  <div class="grid">
    <div class="card">
      <h3>PM2.5</h3>
      <p id="pm25">--</p>
    </div>

    <div class="card">
      <h3>PM10</h3>
      <p id="pm10">--</p>
    </div>

    <div class="card">
      <h3>Last Updated</h3>
      <p id="updated">--</p>
    </div>
  </div>
</main>

<script src="script.js"></script>
</body>
</html>
